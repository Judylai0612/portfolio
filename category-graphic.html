<main>
  <section class="section work-detail">
    <a href="portfolio.html" class="back-link fade-in">← 返回 Portfolio</a>
    <h2 class="section-title fade-in">平面設計</h2>
    <p class="section-subtitle fade-in">Graphic Design</p>

    <div class="work-slides" id="workSlides">
      <article class="work-slide is-active" data-slide="0">
        <div class="work-head">
          <h3 class="work-title">型錄與文宣設計</h3>
          <p class="work-desc">整合產品資訊與品牌調性，透過清晰的版面層級與留白配置，讓文宣同時兼顧美感與可讀性。</p>
        </div>
        <div class="work-mosaic mosaic-3">
          <div class="mosaic-item mosaic-main" style="--card-color:#9FB3B8;"></div>

          <div class="mosaic-item" style="--card-color:#C2B8A3;"></div>

        <div class="work-head">
          <h3 class="work-title">海報視覺設計</h3>
          <p class="work-desc">以強烈的主視覺搭配簡練文字，捕捉觀者目光，同時維持整體設計語彙的一致性。</p>
        </div>
        <div class="work-mosaic mosaic-2">
          <div class="mosaic-item" style="--card-color:#A3B0A3;"></div>
