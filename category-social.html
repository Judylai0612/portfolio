<main>
  <section class="section work-detail">
    <a href="portfolio.html" class="back-link fade-in">← 返回 Portfolio</a>

    <p class="section-subtitle fade-in">Social Post Design</p>

    <div class="work-slides" id="workSlides">
      <article class="work-slide is-active" data-slide="0">
        <div class="work-head">
          <h3 class="work-title">品牌社群主題企劃</h3>
          <p class="work-desc">為品牌規劃一系列社群貼文視覺，統一字體、色彩與版面比例，強化每篇貼文的識別度與閱讀節奏。</p>
        </div>
        <div class="work-mosaic mosaic-3">

          <div class="mosaic-item" style="--card-color:#C2B8A3;"></div>

        </div>
        <div class="work-mosaic mosaic-2">
          <div class="mosaic-item" style="--card-color:#B0A8B9;"></div>
